services:
  - type: web
    name: grifa-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: false   # Render sets this automatically — do NOT override it
      # ── Fill these in Render Dashboard → Environment ──────────────────────
      - key: MONGODB_URI
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false          # Set this to your Vercel frontend URL
      - key: REDIS_URL
        sync: false          # Optional — leave blank if not using Redis
